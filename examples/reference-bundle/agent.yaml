spec_version: "0.6.0-draft"
conformance_level: 1
agent_id: "core-principal-09e"
metadata:
  name: "Cognitive Workspace Router"
  description: "Composition snapshot at export time."
  exported_at: "2026-06-15T12:00:00Z"
topology:
  orchestration:
    - role: primary_reasoning_loop
      implementation:
        name: "ExampleHarness"
        version: "2.4.1"
        uri: "urn:psoul:impl:example-harness"
    - role: sandbox_execution
      implementation:
        name: "ExampleSandbox"
        version: "1.0.0"
        uri: "urn:psoul:impl:example-sandbox"
  models:
    - role: primary_reasoner
      provider: "ExampleCloud"
      endpoint: "frontier-model-2026-05"
      tier: frontier-api
  memory_systems:
    - role: conversation_memory
      implementation:
        name: "ExampleGraphMemory"
        version: "1.2.0"
        uri: "urn:psoul:impl:example-graph-memory"
      exportable: true
    - role: file_index
      implementation:
        name: "ExampleFileIndex"
        version: "0.9.1"
        uri: "urn:psoul:impl:example-file-index"
      exportable: true
  tools:
    - role: file_search
      protocol: mcp
      endpoint: "http://127.0.0.1:7432/mcp"
  connectors:
    - role: mail_ingress
      provider: "example-oauth-bridge"
      data_direction: ingress
  interfaces:
    - role: chat
      protocol: openai-compatible-http
    - role: scheduled_tasks
      protocol: cron
